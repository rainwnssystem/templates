apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - namespace.yaml

namespace: dev
namePrefix: dev-

labels:
  - pairs:
      app.kubernetes.io/environment: dev
    includeSelectors: true

replicas:  # Set nginx deployment replicas to 1
  - name: nginx
    count: 1